name: 'Build test and run'
description: 'Build a test for nakama-cpp and run it'
inputs:
  preset:
    description: 'Configure preset name'
    required: true
  nakama-cpp-path:
    description: 'Relative path under $GITHUB_WORKSPACE to the nakama-cpp repository'
    required: true
  build-type:
    description: The build type.
    required: true
  native-tool-options:
    description: 'Flags to pass to the underlying build system used by the CMake generator.'
    required: false

runs:
  using: "composite"
  steps:
    - name: Install Task
      shell: bash
      run: npm install -g @go-task/cli

    - name: Run tests with Task
      shell: bash
      run: task test
      working-directory: ${{ inputs.nakama-cpp-path }}
