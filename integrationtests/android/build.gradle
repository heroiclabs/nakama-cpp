buildscript {
    dependencies {
        classpath 'com.android.tools.build:gradle:7.3.0'
    }
}
plugins {
    id('com.android.application') version '7.3.0'
}

def abi = (project.findProperty("abi") ?: "arm64-v8a").toString()
def supportedAbis = ["arm64-v8a", "armeabi-v7a", "x86_64"]
if (!supportedAbis.contains(abi)) {
    throw new GradleException("Unsupported abi '${abi}'. Supported values: ${supportedAbis}")
}

dependencies {
    implementation 'androidx.annotation:annotation:1.7.1'
}

repositories {
    google()
    mavenCentral()
    gradlePluginPortal()
}

android {
    compileSdk 34
    ndkVersion "27.2.12479018"

    defaultConfig {
        applicationId "com.heroiclabs.nakamatest"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName '1.0'
        ndk {
            abiFilters abi
        }
    }
    // Native libraries are pre-built via CMake presets and staged into jniLibs/
    // by deploy.sh. This avoids conflicts between Gradle's CMake integration
    // and the project's vcpkg-based toolchain.
    sourceSets {
        main {
            java.srcDirs += '../../android/nakama-sdk/src/main/java'
            jniLibs.srcDirs = ['jniLibs']
        }
    }
    buildTypes {
        customDebugType {
            debuggable true
        }
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
}
